<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox Dollar - Master Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF7B00; --success: #00E676; --danger: #FF5252;
            --dark-bg: #050505; --card-bg: #121212; --input-bg: #1A1A1A; --text: #FFFFFF;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--dark-bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 1100px; margin: auto; padding-bottom: 50px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .admin-header h1 { font-size: 20px; color: var(--primary); margin: 0; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        @media (min-width: 768px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #222; }
        .stat-card h3 { font-size: 10px; color: #888; text-transform: uppercase; margin: 0; }
        .stat-card p { font-size: 18px; font-weight: 700; margin: 5px 0 0; color: var(--primary); }
        .grid-layout { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 992px) { .grid-layout { grid-template-columns: 1fr 1fr; } }
        .admin-box { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid #222; margin-bottom: 15px; }
        .admin-box h2 { font-size: 16px; margin-bottom: 15px; color: var(--primary); border-left: 3px solid var(--primary); padding-left: 10px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #333; border-radius: 10px; color: white; outline: none; font-size: 14px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .btn-primary { background: var(--primary); color: black; }
        .btn-success { background: var(--success); color: black; }
        .btn-danger { background: var(--danger); color: white; }
        .table-wrap { width: 100%; overflow-x: auto; background: var(--card-bg); border-radius: 15px; border: 1px solid #222; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; font-size: 12px; color: #555; padding: 15px; border-bottom: 1px solid #333; }
        td { padding: 12px; font-size: 13px; border-bottom: 1px solid #222; }
        .mini-img { width: 35px; height: 35px; border-radius: 8px; object-fit: cover; }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-header">
        <h1>MASTER CONTROL ⚡</h1>
        <div style="font-size: 11px; color: #888; background: #1a1a1a; padding: 5px 12px; border-radius: 20px;">Admin: Prachi Barmon</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>Total Users</h3><p id="statUsers">0</p></div>
        <div class="stat-card"><h3>Pending Withdraw</h3><p id="statPending">0</p></div>
        <div class="stat-card"><h3>Total Paid</h3><p id="statPaid">0 🟡</p></div>
        <div class="stat-card"><h3>System Balance</h3><p id="statBalance">0 🟡</p></div>
    </div>

    <div class="grid-layout">
        <div class="admin-box">
            <h2>📢 CPA Offer Controller</h2>
            <div class="form-group"><label>Offer Title</label><input type="text" id="offTitle"></div>
            <div class="form-group"><label>CPA Link</label><input type="text" id="offLink"></div>
            <div class="form-group"><label>Reward Coins</label><input type="number" id="offReward"></div>
            <div class="form-group"><label>Image URL</label><input type="text" id="offIcon"></div>
            <button class="btn btn-primary" onclick="pushOffer()">ADD TO INBOX-TASK</button>
            <div class="table-wrap">
                <table><thead><tr><th>Icon</th><th>Title</th><th>Action</th></tr></thead><tbody id="adminOfferList"></tbody></table>
            </div>
        </div>

        <div class="admin-box">
            <h2>✉️ Notice Center</h2>
            <div class="form-group"><label>Scrolling News</label><input type="text" id="scrollInput"></div>
            <button class="btn btn-primary" onclick="updateScroll()">UPDATE SCROLL</button>
            <div class="form-group" style="margin-top:15px;"><label>Popup Message</label><textarea id="popupInput" rows="2"></textarea></div>
            <button class="btn btn-success" onclick="sendPopup(true)">ENABLE POPUP</button>
            <button class="btn btn-danger" onclick="sendPopup(false)">STOP POPUP</button>
        </div>
    </div>

    <div class="admin-box" style="margin-top: 20px;">
        <h2>👥 Registered Users List (Full Control)</h2>
        <div class="table-wrap">
            <table>
                <thead><tr><th>User Info</th><th>Balance Edit</th><th>Action</th></tr></thead>
                <tbody id="fullUserList"></tbody>
            </table>
        </div>
    </div>

    <div class="admin-box" style="margin-top: 20px;">
        <h2>💳 Withdrawal Management</h2>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Name</th><th>Details</th><th>Amount</th><th>Action</th></tr></thead>
                <tbody id="withdrawList"></tbody>
            </table>
        </div>
    </div>
</div>




<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCqI9Te8ffBptsDS-oAIwPjpa5YSSpygYg",
    authDomain: "micro-job-center.firebaseapp.com",
    databaseURL: "https://micro-job-center-default-rtdb.firebaseio.com",
    projectId: "micro-job-center",
    storageBucket: "micro-job-center.firebasestorage.app",
    messagingSenderId: "146985711984",
    appId: "1:146985711984:web:fcb79dd1e82f0f4972b7b5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

window.onload = function() {
    loadDashboardData();
};

function loadDashboardData() {
    // ১. ইউজার কন্ট্রোল এবং ব্যালেন্স স্ট্যাটাস
    db.ref('users').on('value', (snapshot) => {
        const list = document.getElementById('fullUserList');
        let html = ""; let totalSysBal = 0;
        snapshot.forEach(child => {
            const u = child.val(); const uid = child.key;
            totalSysBal += (u.balance || 0);
            const isBlocked = u.isBlocked || false;
            html += `<tr>
                <td><b>${u.username || 'User'}</b><br><small style="color:#666;">${uid}</small></td>
                <td>
                    <input type="number" id="bal_${uid}" value="${u.balance || 0}" style="width:70px; background:#000; color:orange; border:1px solid #333; padding:5px; border-radius:5px;">
                    <button onclick="updateBalance('${uid}')" style="background:orange; border:none; padding:5px; border-radius:5px; cursor:pointer; font-weight:bold;">SAVE</button>
                </td>
                <td>
                    <button onclick="toggleBlock('${uid}', ${isBlocked})" style="background:${isBlocked ? '#00E676' : '#FF5252'}; border:none; padding:8px; border-radius:5px; cursor:pointer; font-weight:bold;">${isBlocked ? 'UNBLOCK' : 'BLOCK'}</button>
                    <button onclick="deleteUser('${uid}')" style="background:#333; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; margin-left:5px;">DEL</button>
                </td>
            </tr>`;
        });
        list.innerHTML = html;
        document.getElementById('statUsers').innerText = snapshot.numChildren();
        document.getElementById('statBalance').innerText = totalSysBal + " 🟡";
    });

    // ২. উইথড্রয়াল কন্ট্রোল এবং পেইড স্ট্যাটাস
    db.ref('withdrawRequests').on('value', (snapshot) => {
        const list = document.getElementById('withdrawList');
        let html = ""; let pending = 0; let paid = 0;
        snapshot.forEach(child => {
            const r = child.val();
            if(r.status === "Pending") {
                pending++;
                html += `<tr>
                    <td>${r.name}</td><td>${r.method}<br><small>${r.account}</small></td><td>${r.amount} 🟡</td>
                    <td><button onclick="approveWithdraw('${child.key}')" class="btn-success" style="padding:5px 10px;">PAID</button>
                    <button onclick="rejectWithdraw('${child.key}','${r.uid}',${r.amount})" class="btn-danger" style="padding:5px 10px;">X</button></td></tr>`;
            } else if(r.status === "Paid") {
                paid += (r.amount || 0);
            }
        });
        list.innerHTML = html || "<tr><td colspan='4' style='text-align:center;'>No Requests</td></tr>";
        document.getElementById('statPending').innerText = pending;
        document.getElementById('statPaid').innerText = paid + " 🟡";
    });

    // ৩. অফার লিস্ট লোড
    db.ref('appSettings/offers').on('value', (s) => {
        let html = "";
        s.forEach(c => {
            html += `<tr><td><img src="${c.val().icon}" class="mini-img"></td><td>${c.val().title}</td>
            <td><button onclick="deleteOffer('${c.key}')" style="color:red; border:none; background:none; cursor:pointer;">Del</button></td></tr>`;
        });
        document.getElementById('adminOfferList').innerHTML = html;
    });

    // ৪. নোটিশ লোড
    db.ref('appSettings/scrollNotice').once('value', s => document.getElementById('scrollInput').value = s.val() || "");
    db.ref('appSettings/popupNotice').once('value', s => document.getElementById('popupInput').value = s.val()?.text || "");
}

// ফাংশনসমূহ
function updateBalance(uid) {
    const b = document.getElementById('bal_' + uid).value;
    db.ref('users/' + uid).update({ balance: parseInt(b) }).then(() => alert("Balance Updated!"));
}
function toggleBlock(uid, s) { db.ref('users/' + uid).update({ isBlocked: !s }); }
function deleteUser(uid) { if(confirm("Delete User?")) db.ref('users/' + uid).remove(); }
function approveWithdraw(rid) { db.ref('withdrawRequests/' + rid).update({ status: "Paid" }); }
function rejectWithdraw(rid, uid, amt) {
    db.ref('users/' + uid + '/balance').transaction(c => (c || 0) + amt);
    db.ref('withdrawRequests/' + rid).update({ status: "Rejected" });
}
function pushOffer() {
    const title = document.getElementById('offTitle').value;
    const link = document.getElementById('offLink').value;
    const reward = document.getElementById('offReward').value;
    const icon = document.getElementById('offIcon').value;
    db.ref('appSettings/offers').push({ title, link, reward: parseInt(reward), icon });
}
function deleteOffer(id) { db.ref('appSettings/offers/' + id).remove(); }
function updateScroll() { db.ref('appSettings/scrollNotice').set(document.getElementById('scrollInput').value); }
function sendPopup(show) { db.ref('appSettings/popupNotice').set({ text: document.getElementById('popupInput').value, show: show }); }
        </script>
